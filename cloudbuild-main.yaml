# Cloud Build CI/CD for college-expert — main branch.
#
# Reuses the test stages from cloudbuild.yaml (which is the PR-only config),
# then adds path-based auto-deploy to production. Only push-to-main triggers
# this file; PR builds keep using cloudbuild.yaml and never deploy.
#
# Pipeline:
#   1. backend-tests       — pytest (~691 tests, <1s) — gate
#   2. bash-syntax         — bash -n on deploy.sh / deploy_frontend.sh — gate
#   3. frontend            — vitest + vite build + Playwright happy-path — gate
#   4. detect-targets      — scripts/cicd/detect_changed_targets.py emits
#                            deploy.sh targets to /workspace/targets.txt
#   5. deploy              — runs ./deploy.sh <target> for each backend target,
#                            then ./deploy_frontend.sh if frontend changed
#
# A red gate (steps 1-3) aborts the build before deploy runs, by Cloud Build's
# default fail-on-first-error behaviour. An empty targets.txt (docs-only PR)
# makes step 5 a no-op, so doc PRs return green in ~5 minutes without
# touching production.
#
# Spec: docs/prd/auto-deploy-on-main.md + docs/design/auto-deploy-on-main.md.
# One-time trigger setup: docs/cicd-setup.md.

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Test gate ~5 min + sequential cloud-function deploys ~3-5 min on cold cache.
# 1200s leaves headroom for occasional npm install retries.
timeout: '1200s'

substitutions:
  _DEPLOY_ACCOUNT: 'cvsubs@gmail.com'
  _DEPLOY_PROJECT: 'college-counselling-478115'
  _FRONTEND_ENV_SECRET: 'frontend-env-prod'

steps:
  # ------- 1-3: test gate (verbatim from cloudbuild.yaml) ------------------

  - name: 'python:3.12-slim'
    id: 'backend-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        pip install --quiet --disable-pip-version-check -r requirements-test.txt
        pytest -q

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'bash-syntax'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        for f in deploy.sh deploy_frontend.sh; do
          bash -n "$f"
          echo "  $f: ok"
        done

  - name: 'mcr.microsoft.com/playwright:v1.59.1-jammy'
    id: 'frontend'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail

        echo "::: installing dependencies :::"
        npm ci --no-audit --no-fund --prefer-offline

        echo "::: vitest unit tests :::"
        npm run test

        echo "::: writing build-time .env (placeholder values for vite build sanity) :::"
        cat > .env <<'EOF'
        VITE_API_URL=https://placeholder
        VITE_PROFILE_MANAGER_URL=https://placeholder
        VITE_PROFILE_MANAGER_V2_URL=https://placeholder
        VITE_KNOWLEDGE_BASE_URL=https://placeholder
        VITE_KNOWLEDGE_BASE_UNIVERSITIES_URL=https://placeholder
        VITE_COUNSELOR_AGENT_URL=https://placeholder
        VITE_FIREBASE_API_KEY=placeholder
        VITE_FIREBASE_AUTH_DOMAIN=placeholder
        VITE_FIREBASE_PROJECT_ID=placeholder
        VITE_FIREBASE_STORAGE_BUCKET=placeholder
        VITE_FIREBASE_MESSAGING_SENDER_ID=placeholder
        VITE_FIREBASE_APP_ID=placeholder
        EOF

        echo "::: vite production build (sanity check) :::"
        npm run build

        echo "::: Playwright E2E :::"
        CI=true npx playwright test

  # ------- 4: detect deploy targets ----------------------------------------

  - name: 'gcr.io/cloud-builders/git'
    id: 'detect-targets'
    waitFor: ['backend-tests', 'bash-syntax', 'frontend']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        # Cloud Build clones the source as a *shallow* checkout — only the
        # merged commit, no parent. `git diff $SHA^..$SHA` therefore fails
        # with "unknown revision" until we pull the parent down. This
        # `--depth=2` fetch is enough for the diff (we only need one
        # ancestor commit). Caught on the first auto-deploy build of PR #94.
        git fetch --depth=2 origin "${COMMIT_SHA}" 2>/dev/null || \
            git fetch --unshallow 2>/dev/null || true
        # Squash-merge style makes "this commit vs. its parent" equivalent
        # to "files in the merged PR" — exactly the scope we want to
        # auto-deploy.
        python3 scripts/cicd/detect_changed_targets.py \
            --rev-range "${COMMIT_SHA}^..${COMMIT_SHA}" \
          > /workspace/targets.txt
        echo "::: deploy targets for ${COMMIT_SHA} :::"
        if [ -s /workspace/targets.txt ]; then
          cat /workspace/targets.txt
        else
          echo "(none — docs/tests-only or out-of-scope changes)"
        fi

  # ------- 5: deploy --------------------------------------------------------

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    waitFor: ['detect-targets']
    entrypoint: 'bash'
    env:
      - 'CLOUDSDK_CORE_ACCOUNT=${_DEPLOY_ACCOUNT}'
      - 'CLOUDSDK_CORE_PROJECT=${_DEPLOY_PROJECT}'
      - 'GCP_ACCOUNT=${_DEPLOY_ACCOUNT}'
      - 'GCP_PROJECT_ID=${_DEPLOY_PROJECT}'
      - 'CI=true'
    args:
      - '-c'
      - |
        set -euo pipefail

        if [ ! -s /workspace/targets.txt ]; then
          echo "No deploy targets — nothing to do."
          exit 0
        fi

        # Frontend last so it picks up any newly-deployed backend URLs.
        backend_targets=$(grep -v '^frontend$' /workspace/targets.txt || true)
        frontend_target=$(grep '^frontend$' /workspace/targets.txt || true)

        for t in $backend_targets; do
          echo ""
          echo "==================================================================="
          echo "  ./deploy.sh $t"
          echo "==================================================================="
          ./deploy.sh "$t"
        done

        if [ -n "$frontend_target" ]; then
          echo ""
          echo "==================================================================="
          echo "  ./deploy_frontend.sh"
          echo "==================================================================="
          # Pull the rendered .env from Secret Manager rather than expecting a
          # laptop file. The secret is one blob containing the full content
          # of frontend/.env on a deploying engineer's laptop.
          gcloud secrets versions access latest \
              --secret="${_FRONTEND_ENV_SECRET}" > frontend/.env
          ./deploy_frontend.sh
        fi
