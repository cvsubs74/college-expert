[pytest]
# Discovery: a single tests/ tree, mirroring cloud_functions/ layout so tests
# stay close in spirit to their source without bloating the deployment package.
# Each cloud function's tests live under tests/cloud_functions/<func>/ and have
# their own conftest.py that puts the source dir on sys.path + stubs heavy
# Google deps so tests are fast and self-contained.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
filterwarnings =
    # google-cloud libs emit DeprecationWarnings on import that aren't ours
    # to fix and would drown the signal:
    ignore::DeprecationWarning:google
