# Cloud Build CI for college-expert.
#
# This file describes the PR-time check that runs on every pull request and
# every push to main. Trigger creation is documented in docs/cicd-setup.md.
#
# Pipeline (under 5 minutes from cold cache):
#   1. Backend unit tests        (pytest, ~170 tests in <1s)
#   2. Bash script syntax check  (bash -n on deploy.sh / deploy_frontend.sh)
#   3. Frontend unit tests       (vitest, ~40 tests in ~5s)
#   4. Frontend production build (vite build) — catches type/import errors
#   5. Frontend E2E              (Playwright, one happy-path against vite preview)
#
# Integration tests against deployed endpoints are NOT run here — those are
# in test_*.sh files that hit live URLs. They get run manually after a real
# deploy.

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Generous cap — the suite plus a fresh Playwright Chromium install runs
# well under 5 minutes; this leaves headroom for npm install on cold cache.
timeout: '600s'

steps:
  # 1. Backend unit tests. Heavy GCP libs are stubbed in conftest, so install
  #    is just pytest + requests.
  - name: 'python:3.12-slim'
    id: 'backend-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        pip install --quiet --disable-pip-version-check -r requirements-test.txt
        pytest -q

  # 2. Shell-script syntax check.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'bash-syntax'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        for f in deploy.sh deploy_frontend.sh; do
          bash -n "$f"
          echo "  $f: ok"
        done

  # 3 + 4 + 5. Frontend pipeline. We run Vitest, build, and Playwright in a
  #            single step to share the npm install — Playwright's image
  #            (mcr.microsoft.com/playwright:v1.49.0-jammy) ships with all
  #            browsers preinstalled, so the cold-start cost is bounded.
  - name: 'mcr.microsoft.com/playwright:v1.49.0-jammy'
    id: 'frontend'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail

        echo "::: installing dependencies :::"
        npm ci --no-audit --no-fund --prefer-offline

        echo "::: vitest unit tests :::"
        # Vitest runs jsdom in-process; mocks all backend HTTP via the
        # tests' own setup. No browser needed, no .env needed.
        npm run test

        echo "::: writing build-time .env :::"
        # The Playwright E2E builds in --mode test, but the prod build below
        # (a separate sanity check) uses these placeholder URLs. Nothing
        # leaks to production — CI never deploys.
        cat > .env <<'EOF'
        VITE_API_URL=https://placeholder
        VITE_PROFILE_MANAGER_URL=https://placeholder
        VITE_PROFILE_MANAGER_V2_URL=https://placeholder
        VITE_KNOWLEDGE_BASE_URL=https://placeholder
        VITE_KNOWLEDGE_BASE_UNIVERSITIES_URL=https://placeholder
        VITE_COUNSELOR_AGENT_URL=https://placeholder
        VITE_FIREBASE_API_KEY=placeholder
        VITE_FIREBASE_AUTH_DOMAIN=placeholder
        VITE_FIREBASE_PROJECT_ID=placeholder
        VITE_FIREBASE_STORAGE_BUCKET=placeholder
        VITE_FIREBASE_MESSAGING_SENDER_ID=placeholder
        VITE_FIREBASE_APP_ID=placeholder
        EOF

        echo "::: vite production build :::"
        npm run build

        echo "::: Playwright E2E :::"
        # CI=true switches Playwright config to single-worker + retries=1
        # and disables `reuseExistingServer`. Playwright's webServer config
        # rebuilds in --mode test (the auth bypass requires non-production
        # MODE) and serves with `vite preview`.
        CI=true npx playwright test
