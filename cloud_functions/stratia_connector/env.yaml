# Non-secret runtime config for the Stratia connector (Cloud Run).
# GOOGLE_CLIENT_SECRET is injected separately from Secret Manager at deploy.
#
# PUBLIC_BASE_URL must equal the deployed Cloud Run URL. It's a chicken-and-egg
# value: deploy once, read the assigned URL, set it here (+ the Google OAuth
# client's authorized redirect URI), then redeploy. See README.
PUBLIC_BASE_URL: "https://stratia-connector-pfnwjfp26a-ue.a.run.app"
COUNSELOR_AGENT_URL: "https://us-east1-college-counselling-478115.cloudfunctions.net/counselor-agent"
PROFILE_MANAGER_V2_URL: "https://profile-manager-v2-pfnwjfp26a-ue.a.run.app"
KNOWLEDGE_BASE_UNIVERSITIES_URL: "https://knowledge-base-manager-universities-v2-pfnwjfp26a-ue.a.run.app"
MCP_SCOPE: "stratia"
OAUTH_USE_FIRESTORE: "true"
# Kill switch — set to "false" to 404 the connector (except /health) without a
# code redeploy. See docs/RUNBOOK-stratia-connector-go-live.md §8.
CONNECTOR_ENABLED: "true"
# Set after creating the Google OAuth client (see README). Safe to keep here
# (client_id is not a secret); the secret is the client secret.
GOOGLE_CLIENT_ID: ""
# Optional private-beta allowlist, comma-separated. Empty = any Google account.
ALLOWED_EMAILS: ""
