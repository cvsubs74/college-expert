name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Make harness scripts executable
        run: chmod +x harness/*.sh scripts/*.sh .claude/hooks/*.sh

      - name: init
        run: bash harness/init.sh

      - name: verify
        run: bash harness/verify.sh
